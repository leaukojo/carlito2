[preset.0]

name="Web"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter="contract/*.json"
exclude_filter="addons/gdUnit4/*, tests/*, reports/*, kit/raw/*.glb, kit/raw/*.glb.import, kit/palettes/*, kit/prefabs/*, kit/import/*, kit/thumbs/*, tools/*, *.bake.json"
export_path="build/web/index.html"
patches=PackedStringArray()
patch_delta_encoding=false
patch_delta_compression_level_zstd=19
patch_delta_min_reduction=0.1
patch_delta_include_filters="*"
patch_delta_exclude_filters=""
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
variant/thread_support=true
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include="<script>
  window.__carlito = { in: {}, inT: 0, ver: 0, outVer: 0, publish: null };
  window.addEventListener('message', function (e) {
    var d = e.data;
    if (!d || d.type !== 'carlitoInput' || !d.values) return;
    window.__carlito.in = d.values;
    window.__carlito.inT = Date.now();
    if (typeof d.version === 'number') window.__carlito.ver = d.version;
  });
  window.__carlito.publish = function (values) {
    parent.postMessage({ type: 'carlitoOutput', version: window.__carlito.outVer, values: values }, '*');
  };
</script>"
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=true
progressive_web_app/ensure_cross_origin_isolation_headers=true
progressive_web_app/offline_page=""
progressive_web_app/display=1
progressive_web_app/orientation=1
progressive_web_app/icon_144x144=""
progressive_web_app/icon_180x180=""
progressive_web_app/icon_512x512=""
progressive_web_app/background_color=Color(0, 0, 0, 1)
threads/emscripten_pool_size=8
threads/godot_pool_size=4
