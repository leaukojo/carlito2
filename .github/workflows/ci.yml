# CI: headless web export on every push to main,
# cache-busted Pages deploy, headless smoke that fails on script errors.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  GODOT_VERSION: 4.6.3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot + export templates
        run: |
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          curl -sSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      # Editor-only classes used as type annotations outside addons/ parse-fail in
      # exported builds (the node silently does nothing) — hard gate. The [^#]* prefix
      # skips comment-only mentions.
      - name: Editor-type annotation gate
        shell: bash
        run: |
          if grep -rnE '^[^#]*(:|->)[[:space:]]*Editor[A-Z][A-Za-z0-9]*' --include='*.gd' src kit tools tests; then
            echo "editor-only type annotation outside addons/ (breaks exported builds)"
            exit 1
          fi

      - name: Import project
        run: godot --headless --import

      # Invokes the gdUnit4 command tool directly instead of runtest.sh: the script
      # launches Godot without --headless, which dies on a display-less runner.
      # --ignoreHeadlessMode is safe here — it only guards InputEvent-driven UI tests,
      # and this suite is pure logic. The --remote-debug port-0 errors it prints are
      # intentional (disables the interactive CLI debugger; see runtest.sh).
      - name: Unit tests (gdUnit4)
        run: godot --headless --path . -s -d --remote-debug tcp://127.0.0.1:0 res://addons/gdUnit4/bin/GdUnitCmdTool.gd --ignoreHeadlessMode -a tests

      # Boot the real main scene headless; a nonzero exit (shell: bash => pipefail)
      # or any SCRIPT ERROR / ERROR fails the build. "still in use" / "leaked at
      # exit" / "Pages in use exist at exit" (PagedAllocator, Linux-only) are
      # known-harmless leak-at-exit noise emitted after the run's real work.
      - name: Headless smoke
        shell: bash
        run: |
          godot --headless --quit-after 120 2>&1 | tee smoke.log
          if grep -E "SCRIPT ERROR|ERROR:" smoke.log | grep -vE "still in use at exit|leaked at exit|Pages in use exist at exit"; then
            echo "smoke failed: errors above"
            exit 1
          fi

      # Stale-bake check: recompute each registered level's
      # authoring-input hash and compare against its committed bake manifest.
      # Game-mode tool scene (not --script): level scripts only compile with
      # autoloads registered.
      - name: Stale-bake check
        run: godot --headless res://tools/check_bakes.tscn

      # Baked-level smoke (load -> baked-scene swap -> spawn -> play) against the
      # dressed level_1 island. CARLITO_LEVEL
      # picks the registry id; boot.gd loads it headless. Same error gate as the default
      # smoke; "still in use"/"leaked at exit"/"Pages in use exist at exit" are known-harmless
      # leak-at-exit noise.
      - name: Baked-level smoke (level_1)
        shell: bash
        env:
          CARLITO_LEVEL: level_1
        run: |
          godot --headless --quit-after 120 2>&1 | tee baked.log
          if grep -E "SCRIPT ERROR|ERROR:" baked.log | grep -vE "still in use at exit|leaked at exit|Pages in use exist at exit"; then
            echo "baked smoke failed: errors above"
            exit 1
          fi

      # Cache-busting: Godot derives every artifact name (.js/.pck/.wasm/.side.wasm,
      # PWA worker + manifest) from the export basename, so exporting as c2-<sha>.html
      # gives all heavy files hash-unique names. index.html is a small copy (copy, not
      # rename: the PWA service worker's cached-file list references c2-<sha>.html).
      - name: Web export (cache-busted)
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA:0:8}"
          mkdir -p build/web
          godot --headless --export-release "Web" "build/web/c2-${SHORT_SHA}.html" 2>&1 | tee export.log
          if grep -E "ERROR:" export.log | grep -vE "still in use at exit|leaked at exit|Pages in use exist at exit"; then
            echo "export failed: errors above"
            exit 1
          fi
          cp "build/web/c2-${SHORT_SHA}.html" build/web/index.html
          touch build/web/.nojekyll
          ls -la build/web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
